<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zusteller-App</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>

<h1>🚚 Zusteller-App</h1>

<input id="cityInput" placeholder="Ort">

<input id="streetInput" placeholder="Straße">

<input id="numberInput" placeholder="Hausnummer">

<textarea id="noteInput" placeholder="Notiz"></textarea>

<button onclick="addAddress()">➕ Adresse hinzufügen</button>

<hr>

<input id="searchInput" placeholder="🔍 Suche" onkeyup="render()">

<div id="stats"></div>

<div class="progress">
    <div id="bar" class="bar"></div>
</div>
<button onclick="toggleMap()">
🗺️ Karte
</button>

<div id="map"
style="
height:400px;
margin-top:10px;
display:none;
border-radius:10px;
">
</div>
<button onclick="showNextOpenAddress()">
🚚 Nächste offene Adresse
</button>
<button onclick="exportData()">
📤 Exportieren
</button>

<button onclick="document.getElementById('importFile').click()">
📥 Importieren
</button>
<input
type="file"
id="pdfFile"
accept=".pdf">

<button onclick="importPdf()">
📄 Zustellbuch importieren
</button>
<button onclick="sortByCity()">
🏘️ Nach Ort sortieren
</button>

<button onclick="sortByStreet()">
🔤 Nach Straße sortieren
</button>
<input
type="file"
id="importFile"
accept=".json"
style="display:none"
onchange="importData(event)">
<div id="app"></div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
