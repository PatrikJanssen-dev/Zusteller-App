<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zusteller-App</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<h1>🚚 Zusteller-App</h1>

<input id="cityInput" placeholder="Ort">

<input id="streetInput" placeholder="Straße">

<input id="numberInput" placeholder="Hausnummer">

<textarea id="noteInput" placeholder="Notiz"></textarea>

<button onclick="addAddress()">➕ Adresse hinzufügen</button>

<hr>

<input id="searchInput" placeholder="🔍 Suche" onkeyup="render()">

<div id="stats"></div>

<div class="progress">
    <div id="bar" class="bar"></div>
</div>
<button onclick="nextOpenAddress()">
🚚 Nächste offene Adresse
</button>
<button onclick="exportData()">
📤 Exportieren
</button>

<button onclick="document.getElementById('importFile').click()">
📥 Importieren
</button>
<button onclick="sortByCity()">
🏘️ Nach Ort sortieren
</button>

<button onclick="sortByStreet()">
🔤 Nach Straße sortieren
</button>
<input
type="file"
id="importFile"
accept=".json"
style="display:none"
onchange="importData(event)">
<div id="app"></div>

<script src="js/app.js"></script>

</body>
</html>
